<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card Design</title>
    <style>
        /* Reset and Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Product Card Container */
.product-card {
    background: #ffffff;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}

/* Image Section */
.product-image {
    position: relative;
    width: 100%;
    height: 240px;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.product-card:hover .product-image img {
    transform: scale(1.08);
}

/* Badge (e.g., "New" or "Sale") */
.badge {
    position: absolute;
    top: 15px;
    left: 15px;
    background-color: #ff4757;
    color: white;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
}

/* Details Section */
.product-details {
    padding: 20px;
}

.product-category {
    color: #888888;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 5px;
}

.product-title {
    color: #2f3542;
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Rating */
.product-rating {
    color: #ffa502; /* Gold color for stars */
    font-size: 0.9rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.rating-count {
    color: #a4b0be;
    font-size: 0.8rem;
}

/* Bottom Row (Price & Action) */
.product-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.price-container {
    display: flex;
    flex-direction: column;
}

.current-price {
    color: #2ed573; /* Green color for price */
    font-size: 1.3rem;
    font-weight: bold;
}

.old-price {
    color: #a4b0be;
    font-size: 0.9rem;
    text-decoration: line-through;
}

/* Button Styling */
.add-to-cart-btn {
    background-color: #1e90ff;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s ease;
}

.add-to-cart-btn:hover {
    background-color: #0077e6;
}
    </style>
</head>
<body>

    <div class="product-card">
        <div class="product-image">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80" alt="Running Shoes">
            <span class="badge">New</span>
        </div>
        
        <div class="product-details">
            <span class="product-category">Footwear</span>
            <h3 class="product-title">Sonic Speed Running Shoes</h3>
            
            <div class="product-rating">
                <span>★ ★ ★ ★ ☆</span>
                <span class="rating-count">(4.5)</span>
            </div>

            <div class="product-bottom">
                <div class="price-container">
                    <span class="current-price">$120.00</span>
                    <span class="old-price">$150.00</span>
                </div>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>
        </div>
    </div>

</body>
</html>
